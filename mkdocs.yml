site_name: Spec2GCP
site_description: AI-powered Google Cloud development workflow - from spec to cloud
site_author: VladimirCro
repo_url: https://github.com/VladimirCro/spec2gcp
repo_name: VladimirCro/spec2gcp

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

exclude_docs: |
  README.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Workflows: workflows.md
  - Shells: shells.md
  - Specs Structure: specs-structure.md
  - APM: apm.md
  - Examples: examples.md
  - Benefits: benefits.md
  - Contributing: contributing.md
  - Primer: PRIMER.md
